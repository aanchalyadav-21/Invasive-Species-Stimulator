<!DOCTYPE html>
<html>
<head>
    <title>Simulation Result</title>

    <style>
        body {
            margin: 0;
           font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;

          background: linear-gradient(to right, #eef2f3, #ffffff);
        }

      .card {
    width: 80%;
    max-width: 700px;

    margin: 60px auto;
    padding: 25px;

    background: white;
    border-radius: 15px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

        h1 {
            margin-bottom: 20px;
        }

        .stat {
            font-size: 18px;
            margin: 10px 0;
        }

        .highlight {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

       button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #388E3C;
    transform: scale(1.05);
}
    </style>
</head>

<body>

<div class="card">

    <h1>Simulation Results</h1>

    <p class="stat" id="finalInfected"></p>
    <p class="stat" id="finalProtected"></p>
    <p class="stat" id="blueUsed"></p>

    <p class="highlight" id="finalMessage"></p>

    <p id="interpretation"></p>

    <button onclick="goBack()">🔄 Run Again</button>

</div>

<script>

let infected = parseInt(localStorage.getItem("infected"));
let protectedArea = parseInt(localStorage.getItem("protected"));
let blueUsed = localStorage.getItem("blue");

document.getElementById("finalInfected").innerText =
    "Infected Area: " + infected + "%";

document.getElementById("finalProtected").innerText =
    "Protected Area: " + protectedArea + "%";

document.getElementById("blueUsed").innerText =
    "Control Actions Used: " + blueUsed;

let message = "";
let interpretation = "";

// RESULT LOGIC
if (infected < 30) {
    message = "Excellent Control Achieved";
    interpretation = "The intervention strategy was highly effective in controlling the spread.";
}
else if (infected < 60) {
    message = "Moderate Spread Observed";
    interpretation = "The spread was partially controlled, but stronger strategies could improve results.";
}
else {
    message = "System Overwhelmed";
    interpretation = "The spread was not effectively controlled, indicating insufficient intervention.";
}

document.getElementById("finalMessage").innerText = message;
document.getElementById("interpretation").innerText = interpretation;

function goBack() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
