<!DOCTYPE html>
<html>
<head>
    <title>Simulation Results</title>

    <style>
      body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #56ab2f, #a8e063);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

      .container {
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
       h1, .stat {
    color: #14532d;
}
        .stat {
            font-size: 20px;
            margin: 15px 0;
        }

        .bar {
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            background: #334155;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            border-radius: 10px;
        }

        .infected {
            background: #ef4444;
        }

        .protected {
            background: #3b82f6;
        }

       button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: #166534;   /* darker green */
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

button:hover {
    background: #14532d;
    transform: scale(1.05);
}
        
        .message {
    color: #166534;
}
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Simulation Results</h1>

    <div class="stat">🔴 Infected Area: <span id="infectedText"></span>%</div>
    <div class="bar">
        <div id="infectedBar" class="fill infected"></div>
    </div>

    <div class="stat">🔵 Protected Area: <span id="protectedText"></span>%</div>
    <div class="bar">
        <div id="protectedBar" class="fill protected"></div>
    </div>
<div class="stat">🛑 Control Measures Used: <span id="blueText"></span></div>
    <div class="stat">⏱️ Time Taken: <span id="timeText"></span> months</div>

    <div class="message" id="finalMessage"></div>

    <button onclick="goHome()">🔁 Run Again</button>

</div>

<script>

let infected = localStorage.getItem("infected");
let protectedArea = localStorage.getItem("protected");
let time = localStorage.getItem("time");

// SET TEXT
document.getElementById("infectedText").innerText = infected;
document.getElementById("protectedText").innerText = protectedArea;
document.getElementById("timeText").innerText = time;

// SET BARS
document.getElementById("infectedBar").style.width = infected + "%";
document.getElementById("protectedBar").style.width = protectedArea + "%";

// SMART MESSAGE
let msg = "";

if (infected > 70) {
    msg = "⚠️ High spread observed. Control measures were insufficient.";
} 
else if (infected > 40) {
    msg = "⚠️ Moderate spread. Early intervention could improve results.";
} 
else {
    msg = "✅ Spread successfully controlled. Effective intervention!";
}

document.getElementById("finalMessage").innerText = msg;

// BACK BUTTON
function goHome() {
    window.location.href = "index.html";
}
let blue = localStorage.getItem("blue");
document.getElementById("blueText").innerText = blue;

</script>

</body>
</html>
