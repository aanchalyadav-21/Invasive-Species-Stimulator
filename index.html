<!DOCTYPE html>
<html>
<head>
    <title>Invasive Species Simulator</title>

    <style>
      body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;

    background: linear-gradient(to right, #eef2f3, #ffffff);
}

       #welcomeScreen {
    height: 100vh;

    background: linear-gradient(to right, #56ab2f, #a8e063);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    color: white;
}

#welcomeScreen h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

#welcomeScreen p {
    font-size: 18px;
    margin-bottom: 20px;
}
h1 {
    margin-bottom: 10px;
}

p {
    color: #444;
}
        #gameScreen {
    display: none;

    width: 80%;
    max-width: 900px;

    margin: 40px auto;
    padding: 20px;

    background: white;
    border-radius: 15px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

    #grid {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    gap: 6px;

    width: max-content;
    margin: 20px auto;
}
.cell {
    width: 40px;
    height: 40px;

    border-radius: 6px;
    background-color: #4caf50;

    transition: all 0.3s ease;
}


        
       button {
    padding: 10px 18px;
    margin: 8px;

    border: none;
    border-radius: 8px;

    background: #4CAF50;
    color: white;

    font-size: 15px;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    background: #388E3C;
    transform: scale(1.05);
}

        #controls {
    position: fixed;
    right: 30px;
    top: 180px;

    background: white;
    padding: 15px;

    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

        #controls button {
            display: block;
            width: 100%;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
    <h1>Invasive Species Control Simulator</h1>
    <p>An interactive model to understand spread dynamics and control strategies.</p>
    <button onclick="startGame()">Enter Simulation</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen"style="display:none;">


    <h1>Invasive Species Spread Simulation</h1>
   <p>
    🟢 Healthy &nbsp;&nbsp; 🔴 Infected &nbsp;&nbsp; 🔵 Controlled
    </p>

    <p>
    Try to reduce the spread as much as possible using control measures.
    </p>

    <button onclick="beginStimulation()">▶️ Start Simulation</button>
    <button onclick="resetSimulation()">🔄 Reset</button>
    <button onclick="goBack()">⬅️ Back</button>
<button onclick="stopSimulation()">⏹ Stop</button>
<button onclick="resumeSimulation()">▶️ Resume</button>

    <p id="stats">Infected Area: 0%</p>

<p id="endMessage" style="font-weight:bold; color:red;"></p>
    <div id="grid"></div>

    <div id="controls">
        <h3>Speed</h3>
        <button onclick="setSpeed('fast')">Fast</button>
        <button onclick="setSpeed('normal')">Normal</button>
        <button onclick="setSpeed('slow')">Slow</button>
    </div>

</div>

<script>
let canClick = true;
let grid = document.getElementById("grid");
let cells = [];
let interval = null;
let spreadSpeed = 2000;
let spreadChance = 0.15;
let blueCount = 0;
let gameEnded = false;

// START GAME
function startGame() {
    document.getElementById("welcomeScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    createGrid();
}

// CREATE GRID
function createGrid() {
    grid.innerHTML = "";
    cells = [];

    for (let i = 0; i < 100; i++) {
        let cell = document.createElement("div");
        cell.classList.add("cell");

        // random infection start
        if (Math.random() < 0.1) {
            cell.style.backgroundColor = "red";
        }

        cell.addEventListener("click", () => {

    if (!canClick) return;   // 👈 stops clicking after end

    if (cell.style.backgroundColor !== "blue") {
        cell.style.backgroundColor = "blue";
        blueCount++;
    }
});

        grid.appendChild(cell);
        cells.push(cell);
    }
}

// START SIMULATION
function beginSimulation() {
    clearInterval(interval);
    interval = setInterval(spreadInfection, spreadSpeed);
}

// SPREAD LOGIC


// UPDATE STATS
function updateStats() {

    let infected = 0;

    for (let i = 0; i < cells.length; i++) {
        if (cells[i].style.backgroundColor === "red") {
            infected++;
        }
    }

    let percent = Math.round((infected / cells.length) * 100);

    document.getElementById("stats").innerText =
        "Infected Area: " + percent + "%";
}
function spreadInfection() {

    let newStates = [];
    let changed = false;

    for (let i = 0; i < cells.length; i++) {

        if (cells[i].style.backgroundColor === "red") {

            let neighbors = [i - 1, i + 1, i - 10, i + 10];

            for (let j = 0; j < neighbors.length; j++) {

                let n = neighbors[j];

                if (cells[n]) {

                    let color = cells[n].style.backgroundColor;

                    if (color !== "red" && color !== "blue") {

                        if (Math.random() < spreadChance) {
                            newStates.push(n);
                            changed = true;
                        }
                    }
                }
            }
        }
    }

    // apply changes AFTER loop
    for (let k = 0; k < newStates.length; k++) {
        cells[newStates[k]].style.backgroundColor = "red";
    }

    updateStats();

    // stop only if no change
    if (!changed && !gameEnded) {
        gameEnded = true;
        clearInterval(interval);
        showEndMessage();
    }
}
function showEndMessage() {
canClick = false;
    document.getElementById("endMessage").innerText =
        "Simulation complete. Analyzing results...";

    setTimeout(() => {
        showFinalResult();
    }, 4000);
}
   function showFinalResult() {

    let infected = 0;
    let protectedCount = 0;

    for (let i = 0; i < cells.length; i++) {

        let color = cells[i].style.backgroundColor;

        if (color === "red") infected++;
        else if (color === "blue") protectedCount++;
    }

    let total = cells.length;

    let infectedPercent = Math.round((infected / total) * 100);
    let protectedPercent = Math.round((protectedCount / total) * 100);

    localStorage.setItem("infected", infectedPercent);
    localStorage.setItem("protected", protectedPercent);
    localStorage.setItem("blue", blueCount);

    window.location.href = "result.html";
}

// RESET
function resetSimulation() {
    clearInterval(interval);
    interval = null;
    blueCount = 0;
    gameEnded = false;
    createGrid();
}

// SPEED CONTROL
function setSpeed(type) {
    clearInterval(interval);

    if (type === "fast") {
        spreadSpeed = 1000;
        spreadChance = 0.2;
    } else if (type === "normal") {
        spreadSpeed = 2000;
        spreadChance = 0.1;
    } else {
        spreadSpeed = 3000;
        spreadChance = 0.15;
    }

    interval = setInterval(spreadInfection, spreadSpeed);
}
function goBack() {
    clearInterval(interval);
    location.reload(); // goes back to welcome screen
}

function stopSimulation() {
    clearInterval(interval);
    interval = null;
}

function resumeSimulation() {
   let redCells = cells.filter(c => c.style.backgroundColor === "red").length;

if (!changed && redCells > 0 && !gameEnded) {
    gameEnded = true;
    clearInterval(interval);
    showEndMessage();
} {
        interval = setInterval(spreadInfection, spreadSpeed);
    }
}

</script>

</body>
</html>
