<!DOCTYPE html>
<html>
<head>
    <title>Invasive Species Simulator</title>

    <style>
      body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;

    background: linear-gradient(to right, #eef2f3, #ffffff);
}

       #welcomeScreen {
    height: 100vh;

    background: linear-gradient(to right, #56ab2f, #a8e063);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    color: white;
}

#welcomeScreen h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

#welcomeScreen p {
    font-size: 18px;
    margin-bottom: 20px;
}
h1 {
    margin-bottom: 10px;
}

p {
    color: #444;
}
    #gameScreen {
    background: rgba(255, 255, 255, 0.9);
    margin: 40px auto;
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 900px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}


    #grid {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    gap: 6px;

    width: max-content;
    margin: 20px auto;
}
.cell {
    width: 40px;
    height: 40px;

    border-radius: 6px;
    background-color: #4caf50;

    transition: all 0.3s ease;
}


        
       button {
    padding: 10px 18px;
    margin: 8px;

    border: none;
    border-radius: 8px;

    background: #4CAF50;
    color: white;

    font-size: 15px;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    background: #388E3C;
    transform: scale(1.05);
}

        #controls {
    position: fixed;
    right: 30px;
    top: 180px;

    background: white;
    padding: 15px;

    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

        #controls button {
            display: block;
            width: 100%;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
    <h1>Invasive Species Control Simulator</h1>
    <p>An interactive model to understand spread dynamics and control strategies.</p>
    <button onclick="startGame()">Enter Simulation</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen"style="display:none;">


    <h1>Invasive Species Spread Simulation</h1>
   <p>
    🟢 Healthy &nbsp;&nbsp; 🔴 Infected &nbsp;&nbsp; 🔵 Controlled
    </p>

    <p>
    Try to reduce the spread as much as possible using control measures.
    </p>

    <button onclick="beginSimulation()">▶️ Start Simulation</button>
    <button onclick="resetSimulation()">🔄 Reset</button>
    <button onclick="goBack()">⬅️ Back</button>
<button onclick="stopSimulation()">⏹ Stop</button>
<button onclick="resumeSimulation()">▶️ Resume</button>

    <p id="stats">Infected Area: 0%</p>
    <h3 id="monthDisplay">Month: 0</h3>
<p id="message"></p>

<p id="endMessage" style="font-weight:bold; color:red;"></p>
    <div id="grid"></div>
   

    <div id="controls">
        <h3>Speed</h3>
        <button onclick="setSpeed('fast')">Fast</button>
        <button onclick="setSpeed('normal')">Normal</button>
        <button onclick="setSpeed('slow')">Slow</button>
    </div>

</div>

<script>
let time = 0;
let canClick = true;
let grid;
let cells = [];
let interval = null;
let spreadSpeed = 2000;
let spreadChance = 0.15;
let blueCount = 0;
let gameEnded = false;
let noSpreadCount = 0;



// START GAME
function startGame() {
    document.getElementById("welcomeScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    createGrid();
   
    
}

// CREATE GRID
function createGrid() {

    grid = document.getElementById("grid");
    grid.innerHTML = "";
    cells = [];

    for (let i = 0; i < 100; i++) {

        let cell = document.createElement("div");
        cell.classList.add("cell");
        cell.style.backgroundColor = "green";

        // random infection start
        if (Math.random() < 0.1) {
            cell.style.backgroundColor = "red";
        }

        // CLICK LOGIC
        cell.addEventListener("click", () => {

            if (!canClick) return;

            if (!cell.classList.contains("controlled")) {

                cell.classList.add("controlled");
                cell.style.backgroundColor = "blue";

                blueCount++;
            }
        });

        // ✅ THESE WERE IN WRONG PLACE
        grid.appendChild(cell);
        cells.push(cell);
    }

    updateStats();
}
// START SIMULATION
function beginSimulation() {

    time = 0;
    noSpreadCount = 0;  
    document.getElementById("monthDisplay").innerText = "Month: 0";

    clearInterval(interval);
    interval = setInterval(spreadInfection, spreadSpeed);
}
// SPREAD LOGIC


// UPDATE STATS
function updateStats() {

    let infected = 0;

    for (let i = 0; i < cells.length; i++) {
        if (cells[i].style.backgroundColor === "red") {
            infected++;
        }
    }

    let percent = Math.round((infected / cells.length) * 100);

    document.getElementById("stats").innerText =
        "Infected Area: " + percent + "%";
}
function spreadInfection() {

    time++;
    document.getElementById("monthDisplay").innerText =
        "Month: " + time;

    let changed = false;
    let newRed = [];

    // 🔥 SPREAD LOGIC
    cells.forEach((cell, index) => {

        if (cell.style.backgroundColor === "red") {

            let neighbors = [
                index - 1,
                index + 1,
                index - 10,
                index + 10
            ];

            neighbors.forEach(i => {

                if (cells[i] &&
                    cells[i].style.backgroundColor === "green") {

                    if (Math.random() < spreadChance) {
                        newRed.push(cells[i]);
                        changed = true;
                    }
                }
            });
        }
    });

    // APPLY NEW RED
    newRed.forEach(cell => {
        cell.style.backgroundColor = "red";
    });

    // UPDATE STATS
    updateStats();

    // ✅ 👉 PLACE END CONDITION HERE (VERY END)

    if (changed) {
    noSpreadCount = 0; // reset if spread happens
} else {
    noSpreadCount++;
}

// check if any green cells left
let greenLeft = cells.some(cell =>
    cell.style.backgroundColor === "green"
);

// FINAL END CONDITION

if (!canSpreadFurther() && !gameEnded) {

    gameEnded = true;
    clearInterval(interval);

    canClick = false;

    showEndMessage();
}
}
function showEndMessage() {

    canClick = false; // 🛑 stop placing blue boxes

    document.getElementById("endMessage").innerText =
        "Simulation complete. Analyzing results...";

    document.getElementById("message").innerText =
        "Spread stabilized after " + time + " months";

    setTimeout(() => {
        showFinalResult();
    }, 2000); // ⏱️ 2 second delay
}
   function showFinalResult() {

    let infected = 0;
    let protectedCount = 0;

    cells.forEach(cell => {
        if (cell.style.backgroundColor === "red") infected++;
        if (cell.style.backgroundColor === "blue") protectedCount++;
    });

    let total = cells.length;

    let infectedPercent = Math.round((infected / total) * 100);
    let protectedPercent = Math.round((protectedCount / total) * 100);

    localStorage.setItem("infected", infectedPercent);
    localStorage.setItem("protected", protectedPercent);
    localStorage.setItem("time", time);

    console.log("Going to result page...");

    window.location.href = "result.html";
}
// RESET
function resetSimulation() {
noSpreadCount = 0;
    clearInterval(interval);
    interval = null;

    time = 0;  // ✅ RESET TIME

    document.getElementById("monthDisplay").innerText = "Month: 0";

    blueCount = 0;
    gameEnded = false;

    document.getElementById("endMessage").innerText = "";
    document.getElementById("stats").innerText = "Infected Area: 0%";

    createGrid();
    cells.forEach(cell => {
    cell.classList.remove("controlled"); // reset tracking
});
}

// SPEED CONTROL
function setSpeed(type) {
    clearInterval(interval);

    if (type === "fast") {
        spreadSpeed = 1000;
        spreadChance = 0.2;
    } else if (type === "normal") {
        spreadSpeed = 2500;
        spreadChance = 0.1;
    } else {
        spreadSpeed = 3500;
        spreadChance = 0.15;
    }

    interval = setInterval(spreadInfection, spreadSpeed);
}
function goBack() {
    clearInterval(interval);
    location.reload(); // goes back to welcome screen
}

function stopSimulation() {
    clearInterval(interval);
    interval = null;
}

function resumeSimulation() {
    if (!interval) {
        interval = setInterval(spreadInfection, spreadSpeed);
    }
}
function resetGrid() {

    clearInterval(interval);
    month = 0;

    document.getElementById("monthDisplay").innerText = "Month: 0";
    document.getElementById("message").innerText = "";

    cells.forEach(cell => {
        cell.style.backgroundColor = "green";
    });


    canClick = true;
}
function canSpreadFurther() {

    for (let i = 0; i < cells.length; i++) {

        if (cells[i].style.backgroundColor === "red") {

            let neighbors = [
                i - 1,
                i + 1,
                i - 10,
                i + 10
            ];

            for (let j of neighbors) {
                if (cells[j] && cells[j].style.backgroundColor === "green") {
                    return true; // spread still possible
                }
            }
        }
    }

    return false; // no possible spread left
}

</script>

</body>
</html>
